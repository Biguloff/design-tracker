<style>
:root {
  --bg: #08090B;
  --bg2: #0C0D0F;
  --bg3: #141517;
  --accent: #7D4FFF;
  --accent-light: #B298FF;
  --green: #34C759;
  --yellow: #FFB800;
  --red: #FF3B30;
  --text: #FFFFFF;
  --text2: #8D93A1;
  --border: #29292E;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,-apple-system,sans-serif; line-height:1.5; }
a { color:var(--accent-light); text-decoration:none; }
.container { max-width:1200px; margin:0 auto; padding:24px 16px; }

/* Header */
.header { text-align:center; padding:40px 0 32px; border-bottom:1px solid var(--border); margin-bottom:32px; }
.header h1 { font-size:32px; font-weight:700; background:linear-gradient(81.16deg, #FFF 37.23%, rgba(255,255,255,0.5) 81.25%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header p { color:var(--text2); margin-top:8px; }
.updated { color:var(--text2); font-size:12px; margin-top:4px; }

/* Dashboard */
.dashboard { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; margin-bottom:40px; }
.ring-card { background:var(--bg2); border-radius:16px; padding:24px; text-align:center; min-width:140px; border:1px solid var(--border); }
.ring { width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:20px; font-weight:700; position:relative; }
.ring::before { content:''; position:absolute; inset:0; border-radius:50%; }
.ring-label { font-size:13px; color:var(--text2); }

/* Filters */
.filters { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.filter-btn { background:var(--bg2); border:1px solid var(--border); color:var(--text2); padding:6px 14px; border-radius:50px; cursor:pointer; font-size:13px; transition:all 0.2s; }
.filter-btn:hover, .filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

/* Screen sections */
.screen { background:var(--bg2); border-radius:20px; margin-bottom:24px; border:1px solid var(--border); overflow:hidden; }
.screen-header { padding:20px 24px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.screen-header:hover { background:var(--bg3); }
.screen-title { font-size:18px; font-weight:600; display:flex; align-items:center; gap:12px; }
.screen-icon { font-size:24px; }
.screen-progress { display:flex; align-items:center; gap:12px; }
.progress-bar { width:200px; height:8px; background:var(--bg); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, var(--accent-light), var(--accent)); border-radius:4px; transition:width 0.5s ease; }
.progress-text { font-size:14px; font-weight:600; min-width:45px; text-align:right; }

/* Element list */
.elements { padding:0 24px 20px; display:none; }
.elements.open { display:block; }
.element { display:grid; grid-template-columns:32px 1fr 180px 180px 100px; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; }
.element:last-child { border-bottom:none; }
.el-status { font-size:18px; text-align:center; }
.el-name { font-weight:500; }
.el-figma { color:var(--accent-light); font-family:'SF Mono',monospace; font-size:12px; }
.el-ios { color:var(--text2); font-family:'SF Mono',monospace; font-size:12px; }
.el-badge { padding:3px 10px; border-radius:50px; font-size:11px; font-weight:600; text-align:center; }
.badge-done { background:rgba(52,199,89,0.15); color:var(--green); }
.badge-wrong { background:rgba(255,184,0,0.15); color:var(--yellow); }
.badge-missing { background:rgba(255,59,48,0.15); color:var(--red); }
.badge-progress { background:rgba(125,79,255,0.15); color:var(--accent-light); }

/* Category headers in elements */
.el-category { grid-column:1/-1; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); padding:12px 0 4px; border-bottom:1px solid var(--border); }

/* Responsive */
@media (max-width:768px) {
  .element { grid-template-columns:28px 1fr 1fr; font-size:12px; }
  .el-figma, .el-ios { display:none; }
  .progress-bar { width:100px; }
  .dashboard { gap:12px; }
  .ring-card { min-width:100px; padding:16px; }
}

/* Chevron */
.chevron { transition:transform 0.3s; font-size:20px; color:var(--text2); }
.screen-header.open .chevron { transform:rotate(90deg); }

/* Stats bar */
.stats-bar { display:flex; gap:24px; justify-content:center; margin-bottom:32px; flex-wrap:wrap; }
.stat { text-align:center; }
.stat-num { font-size:28px; font-weight:700; }
.stat-label { font-size:12px; color:var(--text2); }
</style>

// ═══════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════

function getStatusIcon(s) {
  return { done:"✅", wrong:"⚠️", missing:"❌", progress:"⏳" }[s] || "❓";
}
function getStatusBadge(s) {
  const labels = { done:"Done", wrong:"Wrong", missing:"Missing", progress:"In Progress" };
  return `<span class="el-badge badge-${s}">${labels[s]||s}</span>`;
}

function calcStats() {
  let total=0, done=0, wrong=0, missing=0, progress=0;
  const perScreen = {};
  DATA.screens.forEach(scr => {
    let sd=0, st=0;
    scr.elements.forEach(el => {
      total++; st++;
      if(el.status==="done"){done++;sd++;}
      else if(el.status==="wrong"){wrong++;}
      else if(el.status==="missing"){missing++;}
      else{progress++;}
    });
    perScreen[scr.id] = { done:sd, total:st, pct: st?Math.round(sd/st*100):0 };
  });
  return { total, done, wrong, missing, progress, perScreen, pct: total?Math.round(done/total*100):0 };
}

function renderDashboard(stats) {
  const cats = [
    { label:"Overall", pct:stats.pct, color:"var(--accent)" },
  ];
  // Per-category
  const catMap = {};
  DATA.screens.forEach(scr => scr.elements.forEach(el => {
    const c = el.cat.split(" ")[0];
    if(!catMap[c]) catMap[c]={done:0,total:0};
    catMap[c].total++;
    if(el.status==="done") catMap[c].done++;
  }));
  ["Colors","Typography","Layout","Effects","Bugs","Critical"].forEach(c => {
    if(catMap[c]) cats.push({ label:c, pct:Math.round(catMap[c].done/catMap[c].total*100), color: catMap[c].done===catMap[c].total?"var(--green)":catMap[c].done/catMap[c].total>0.6?"var(--yellow)":"var(--red)" });
  });

  document.getElementById("dashboard").innerHTML = cats.map(c => `
    <div class="ring-card">
      <div class="ring" style="border:4px solid ${c.color}">${c.pct}%</div>
      <div class="ring-label">${c.label}</div>
    </div>
  `).join("");

  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-num">${stats.total}</div><div class="stat-label">Total Elements</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${stats.done}</div><div class="stat-label">✅ Done</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--yellow)">${stats.wrong}</div><div class="stat-label">⚠️ Wrong</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--red)">${stats.missing}</div><div class="stat-label">❌ Missing</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent-light)">${stats.progress}</div><div class="stat-label">⏳ In Progress</div></div>
  `;
}

function renderScreens(stats) {
  document.getElementById("screens").innerHTML = DATA.screens.map(scr => {
    const s = stats.perScreen[scr.id];
    let lastCat = "";
    const rows = scr.elements.map(el => {
      let catRow = "";
      if(el.cat !== lastCat) {
        catRow = `<div class="el-category">${el.cat}</div>`;
        lastCat = el.cat;
      }
      return catRow + `
        <div class="element" data-status="${el.status}">
          <div class="el-status">${getStatusIcon(el.status)}</div>
          <div class="el-name">${el.name}</div>
          <div class="el-figma">${el.figma}</div>
          <div class="el-ios">${el.ios}</div>
          ${getStatusBadge(el.status)}
        </div>`;
    }).join("");

    return `
      <div class="screen" id="screen-${scr.id}">
        <div class="screen-header" onclick="toggleScreen('${scr.id}')">
          <div class="screen-title">
            <span class="screen-icon">${scr.icon}</span>
            ${scr.name}
          </div>
          <div class="screen-progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%"></div></div>
            <div class="progress-text">${s.done}/${s.total}</div>
            <span class="chevron">›</span>
          </div>
        </div>
        <div class="elements" id="els-${scr.id}">${rows}</div>
      </div>`;
  }).join("");
}

function toggleScreen(id) {
  const els = document.getElementById("els-"+id);
  const hdr = els.previousElementSibling;
  els.classList.toggle("open");
  hdr.classList.toggle("open");
}

function filterElements(status) {
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  document.querySelectorAll(".element").forEach(el => {
    if(status==="all") el.style.display="";
    else el.style.display = el.dataset.status===status ? "" : "none";
  });
}

// Init
const stats = calcStats();
renderDashboard(stats);
renderScreens(stats);
</script>
