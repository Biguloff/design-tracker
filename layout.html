<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Me — Layout & Effects Audit</title>
<style>
:root {
  --bg: #08090B;
  --bg2: #0C0D0F;
  --bg3: #141517;
  --accent: #7D4FFF;
  --accent-light: #B298FF;
  --green: #34C759;
  --yellow: #FFB800;
  --red: #FF3B30;
  --blue: #0A84FF;
  --text: #FFFFFF;
  --text2: #8D93A1;
  --border: #29292E;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,-apple-system,sans-serif; line-height:1.5; }
a { color:var(--accent-light); text-decoration:none; }
.container { max-width:1400px; margin:0 auto; padding:24px 16px; }

/* Header */
.header { text-align:center; padding:40px 0 32px; border-bottom:1px solid var(--border); margin-bottom:32px; }
.header h1 { font-size:28px; font-weight:700; background:linear-gradient(81.16deg,#FFF 37.23%,rgba(255,255,255,0.5) 81.25%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header p { color:var(--text2); margin-top:8px; font-size:14px; }
.nav-links { margin-top:16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.nav-links a { background:var(--bg2); border:1px solid var(--border); padding:8px 20px; border-radius:50px; font-size:13px; font-weight:600; transition:all 0.2s; }
.nav-links a:hover, .nav-links a.active { background:var(--accent); color:white; border-color:var(--accent); }

/* Dashboard */
.dashboard { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-bottom:32px; }
.stat-card { background:var(--bg2); border-radius:16px; padding:20px 28px; text-align:center; border:1px solid var(--border); min-width:120px; }
.stat-card .num { font-size:32px; font-weight:700; }
.stat-card .lbl { font-size:12px; color:var(--text2); margin-top:4px; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--bg2); border-radius:50px; padding:4px; border:1px solid var(--border); overflow-x:auto; }
.tab { padding:10px 20px; border-radius:50px; cursor:pointer; font-size:13px; font-weight:600; color:var(--text2); white-space:nowrap; transition:all 0.2s; }
.tab:hover { color:var(--text); }
.tab.active { background:var(--accent); color:white; }

/* Sections */
.section { background:var(--bg2); border-radius:20px; margin-bottom:24px; border:1px solid var(--border); overflow:hidden; display:none; }
.section.visible { display:block; }
.section-header { padding:20px 24px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.section-header:hover { background:var(--bg3); }
.section-title { font-size:18px; font-weight:600; display:flex; align-items:center; gap:12px; }
.section-body { padding:0 24px 20px; display:none; }
.section-body.open { display:block; }
.chevron { transition:transform 0.3s; font-size:20px; color:var(--text2); }
.section-header.open .chevron { transform:rotate(90deg); }

/* Tables */
.audit-table { width:100%; border-collapse:collapse; font-size:12px; }
.audit-table th { text-align:left; padding:10px 8px; color:var(--accent-light); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid var(--border); position:sticky; top:0; background:var(--bg2); }
.audit-table td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:top; }
.audit-table tr:hover td { background:rgba(125,79,255,0.04); }
td.el { font-weight:500; min-width:140px; }
td.figma { color:var(--accent-light); font-family:'SF Mono',monospace; font-size:11px; }
td.ios { color:var(--text2); font-family:'SF Mono',monospace; font-size:11px; }
td.note { font-size:11px; color:var(--text2); max-width:200px; }

/* Status badges */
.badge { padding:3px 10px; border-radius:50px; font-size:10px; font-weight:700; text-transform:uppercase; white-space:nowrap; }
.b-match { background:rgba(52,199,89,0.15); color:var(--green); }
.b-wrong { background:rgba(255,184,0,0.15); color:var(--yellow); }
.b-missing { background:rgba(255,59,48,0.15); color:var(--red); }
.b-hardcoded { background:rgba(10,132,255,0.15); color:var(--blue); }
.b-partial { background:rgba(255,184,0,0.15); color:var(--yellow); }

/* Category divider */
.cat-row td { padding:14px 8px 6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); border-bottom:1px solid var(--border); background:var(--bg3); }

/* Gradient previews */
.grad-preview { height:24px; border-radius:6px; min-width:100px; border:1px solid rgba(255,255,255,0.1); }
.blur-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; backdrop-filter:blur(4px); background:rgba(255,255,255,0.1); }

/* Responsive */
@media (max-width:900px) {
  .audit-table { font-size:11px; }
  td.note { display:none; }
  .stat-card { min-width:80px; padding:12px 16px; }
  .stat-card .num { font-size:24px; }
}

/* Filter */
.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:5px 12px; border-radius:50px; cursor:pointer; font-size:12px; transition:all 0.2s; }
.filter-btn:hover,.filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

/* Search */
.search { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 16px; border-radius:50px; font-size:14px; width:100%; max-width:400px; margin-bottom:24px; outline:none; }
.search:focus { border-color:var(--accent); }
.search::placeholder { color:var(--text2); }
</style>

// ═══════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════

let activeTab = "dimensions";
let activeFilter = "all";
let searchQuery = "";

function statusIcon(s) {
  return { match:"\u2705", wrong:"\u26A0\uFE0F", missing:"\u274C", hardcoded:"\uD83D\uDD27", partial:"\u26A0\uFE0F" }[s] || "\u2753";
}
function statusBadge(s) {
  const labels = { match:"Match", wrong:"Wrong", missing:"Missing", hardcoded:"Hardcoded", partial:"Partial" };
  const cls = { match:"b-match", wrong:"b-wrong", missing:"b-missing", hardcoded:"b-hardcoded", partial:"b-partial" };
  return `<span class="badge ${cls[s]||''}">${labels[s]||s}</span>`;
}

function calcStats() {
  let total=0, match=0, wrong=0, missing=0, hardcoded=0;
  DATA.tabs.forEach(tab => {
    tab.sections.forEach(sec => {
      sec.rows.forEach(r => {
        if (r.cat) return;
        total++;
        if (r.status==="match") match++;
        else if (r.status==="wrong") wrong++;
        else if (r.status==="missing") missing++;
        else if (r.status==="hardcoded") hardcoded++;
      });
    });
  });
  return { total, match, wrong, missing, hardcoded, pct: total ? Math.round(match/total*100) : 0 };
}

function renderDashboard() {
  const s = calcStats();
  document.getElementById("dashboard").innerHTML = `
    <div class="stat-card"><div class="num">${s.total}</div><div class="lbl">Total Elements</div></div>
    <div class="stat-card"><div class="num" style="color:var(--green)">${s.match}</div><div class="lbl">\u2705 Match</div></div>
    <div class="stat-card"><div class="num" style="color:var(--yellow)">${s.wrong}</div><div class="lbl">\u26A0\uFE0F Wrong</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${s.missing}</div><div class="lbl">\u274C Missing</div></div>
    <div class="stat-card"><div class="num" style="color:var(--blue)">${s.hardcoded}</div><div class="lbl">\uD83D\uDD27 Hardcoded</div></div>
    <div class="stat-card"><div class="num" style="color:var(--accent-light)">${s.pct}%</div><div class="lbl">Match Rate</div></div>
  `;
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = DATA.tabs.map(t =>
    `<div class="tab ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.name}</div>`
  ).join('');
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  renderContent();
}

function filterStatus(s) {
  activeFilter = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderContent();
}

function filterSearch(q) {
  searchQuery = q.toLowerCase();
  renderContent();
}

function renderContent() {
  const tab = DATA.tabs.find(t => t.id === activeTab);
  if (!tab) return;

  let html = '';
  tab.sections.forEach((sec, si) => {
    const filteredRows = sec.rows.filter(r => {
      if (r.cat) return true;
      if (activeFilter !== "all" && r.status !== activeFilter) return false;
      if (searchQuery && !(r.el||'').toLowerCase().includes(searchQuery) && !(r.figma||'').toLowerCase().includes(searchQuery) && !(r.ios||'').toLowerCase().includes(searchQuery)) return false;
      return true;
    });

    // Remove trailing category headers with no data rows after them
    const cleanRows = [];
    for (let i=0; i<filteredRows.length; i++) {
      if (filteredRows[i].cat) {
        // Check if there's at least one data row after this cat
        let hasData = false;
        for (let j=i+1; j<filteredRows.length; j++) {
          if (filteredRows[j].cat) break;
          hasData = true;
          break;
        }
        if (hasData) cleanRows.push(filteredRows[i]);
      } else {
        cleanRows.push(filteredRows[i]);
      }
    }

    if (cleanRows.filter(r=>!r.cat).length === 0) return;

    const secMatch = cleanRows.filter(r=>!r.cat && r.status==="match").length;
    const secTotal = cleanRows.filter(r=>!r.cat).length;
    const secPct = secTotal ? Math.round(secMatch/secTotal*100) : 0;

    html += `<div class="section visible">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">${sec.screen} <span style="font-size:13px;color:var(--text2);font-weight:400">(${secMatch}/${secTotal})</span></div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:120px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="width:${secPct}%;height:100%;background:linear-gradient(90deg,var(--accent-light),var(--accent));border-radius:3px"></div></div>
          <span style="font-size:14px;font-weight:600;min-width:40px;text-align:right">${secPct}%</span>
          <span class="chevron">\u203A</span>
        </div>
      </div>
      <div class="section-body">
        <table class="audit-table">
          <tr><th>St</th><th>Element</th><th>Figma</th><th>iOS</th><th>Status</th><th>Note</th></tr>
          ${cleanRows.map(r => {
            if (r.cat) return `<tr><td class="cat-row" colspan="6">${r.cat}</td></tr>`;
            return `<tr>
              <td>${statusIcon(r.status)}</td>
              <td class="el">${r.el}</td>
              <td class="figma">${r.figma||'—'}</td>
              <td class="ios">${r.ios||'—'}</td>
              <td>${statusBadge(r.status)}</td>
              <td class="note">${r.note||''}</td>
            </tr>`;
          }).join('')}
        </table>
      </div>
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// Init
renderDashboard();
renderTabs();
renderContent();
</script>
