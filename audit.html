<style>
:root {
  --bg: #08090B;
  --bg2: #0C0D0F;
  --bg3: #141517;
  --accent: #7D4FFF;
  --accent-light: #B298FF;
  --green: #34C759;
  --yellow: #FFB800;
  --red: #FF3B30;
  --text: #FFFFFF;
  --text2: #8D93A1;
  --border: #29292E;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,-apple-system,sans-serif; line-height:1.5; }
a { color:var(--accent-light); text-decoration:none; }
a:hover { text-decoration:underline; }
.container { max-width:1400px; margin:0 auto; padding:24px 16px; }

.header { text-align:center; padding:40px 0 24px; border-bottom:1px solid var(--border); margin-bottom:32px; }
.header h1 { font-size:28px; font-weight:700; background:linear-gradient(81.16deg, #FFF 37.23%, rgba(255,255,255,0.5) 81.25%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header p { color:var(--text2); margin-top:8px; font-size:14px; }
.back-link { display:inline-block; margin-bottom:16px; font-size:13px; }

/* Summary cards */
.summary { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-bottom:32px; }
.sum-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px 24px; text-align:center; min-width:120px; }
.sum-num { font-size:28px; font-weight:700; }
.sum-label { font-size:12px; color:var(--text2); }
.sum-match .sum-num { color:var(--green); }
.sum-wrong .sum-num { color:var(--yellow); }
.sum-miss .sum-num { color:var(--red); }
.sum-total .sum-num { color:var(--accent-light); }

/* Screen sections */
.screen { background:var(--bg2); border-radius:16px; margin-bottom:24px; border:1px solid var(--border); overflow:hidden; }
.screen-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; }
.screen-header:hover { background:var(--bg3); }
.screen-title { font-size:18px; font-weight:600; display:flex; align-items:center; gap:10px; }
.screen-stats { display:flex; gap:12px; align-items:center; font-size:13px; }
.screen-stats span { padding:3px 10px; border-radius:50px; font-weight:600; }
.s-match { background:rgba(52,199,89,0.15); color:var(--green); }
.s-wrong { background:rgba(255,184,0,0.15); color:var(--yellow); }
.s-miss { background:rgba(255,59,48,0.15); color:var(--red); }
.chevron { transition:transform 0.3s; font-size:18px; color:var(--text2); margin-left:12px; }
.screen-header.open .chevron { transform:rotate(90deg); }

/* Tables */
.audit-body { padding:0 20px 20px; display:none; overflow-x:auto; }
.audit-body.open { display:block; }
.cat-header { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); padding:14px 0 6px; border-bottom:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:8px; }
th { text-align:left; padding:8px 6px; color:var(--text2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:7px 6px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:top; }
td:first-child { font-weight:500; white-space:nowrap; max-width:200px; }
td:nth-child(2), td:nth-child(3) { font-family:'SF Mono',monospace; font-size:12px; color:var(--accent-light); max-width:240px; word-break:break-all; }
td:nth-child(3) { color:var(--text2); }
.status { padding:2px 10px; border-radius:50px; font-size:11px; font-weight:600; display:inline-block; white-space:nowrap; }
.st-match { background:rgba(52,199,89,0.15); color:var(--green); }
.st-wrong { background:rgba(255,184,0,0.15); color:var(--yellow); }
.st-miss { background:rgba(255,59,48,0.15); color:var(--red); }
.st-note { background:rgba(125,79,255,0.15); color:var(--accent-light); }
td.note { font-size:11px; color:var(--text2); max-width:300px; }

/* Responsive */
@media (max-width:900px) {
  td:nth-child(5) { display:none; }
  .container { padding:12px 8px; }
}
</style>

function countAll() {
  let m=0, w=0, mi=0, n=0;
  AUDIT.forEach(s => s.sections.forEach(sec => sec.rows.forEach(r => {
    if (r.status==="match") m++;
    else if (r.status==="wrong") w++;
    else if (r.status==="missing") mi++;
    else n++;
  })));
  return {match:m, wrong:w, missing:mi, note:n, total:m+w+mi+n};
}

function countScreen(screen) {
  let m=0, w=0, mi=0, n=0;
  screen.sections.forEach(sec => sec.rows.forEach(r => {
    if (r.status==="match") m++;
    else if (r.status==="wrong") w++;
    else if (r.status==="missing") mi++;
    else n++;
  }));
  return {match:m, wrong:w, missing:mi, note:n, total:m+w+mi+n};
}

// Summary
const c = countAll();
document.getElementById("summary").innerHTML = `
  <div class="sum-card sum-total"><div class="sum-num">${c.total}</div><div class="sum-label">Всего элементов</div></div>
  <div class="sum-card sum-match"><div class="sum-num">${c.match}</div><div class="sum-label">Совпадает</div></div>
  <div class="sum-card sum-wrong"><div class="sum-num">${c.wrong}</div><div class="sum-label">Расхождение</div></div>
  <div class="sum-card sum-miss"><div class="sum-num">${c.missing}</div><div class="sum-label">Отсутствует</div></div>
  <div class="sum-card"><div class="sum-num" style="color:var(--accent-light)">${Math.round(c.match/c.total*100)}%</div><div class="sum-label">Соответствие</div></div>
`;

// Screens
const cont = document.getElementById("screens");
AUDIT.forEach(screen => {
  const sc = countScreen(screen);
  const pct = Math.round(sc.match/sc.total*100);
  let html = `<div class="screen">
    <div class="screen-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
      <div class="screen-title"><span style="font-size:22px">${screen.icon}</span> ${screen.name}</div>
      <div class="screen-stats">
        <span class="s-match">${sc.match}</span>
        <span class="s-wrong">${sc.wrong}</span>
        <span class="s-miss">${sc.missing}</span>
        <span style="font-weight:700">${pct}%</span>
        <span class="chevron">&#9654;</span>
      </div>
    </div>
    <div class="audit-body">`;

  screen.sections.forEach(sec => {
    html += `<div class="cat-header">${sec.cat}</div>
    <table><tr><th>Элемент</th><th>Figma</th><th>iOS</th><th>Статус</th><th>Примечание</th></tr>`;
    sec.rows.forEach(r => {
      const cls = r.status==="match"?"st-match":r.status==="wrong"?"st-wrong":r.status==="missing"?"st-miss":"st-note";
      const label = r.status==="match"?"OK":r.status==="wrong"?"WRONG":r.status==="missing"?"MISSING":"NOTE";
      html += `<tr>
        <td>${r.el}</td>
        <td>${r.figma}</td>
        <td>${r.ios}</td>
        <td><span class="status ${cls}">${label}</span></td>
        <td class="note">${r.note||""}</td>
      </tr>`;
    });
    html += `</table>`;
  });

  html += `</div></div>`;
  cont.innerHTML += html;
});
